services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: autofree:latest
    container_name: autofree
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    restart: unless-stopped
    # Playwright 跑无头浏览器有时需要更大共享内存
    shm_size: "1gb"

  # 可选 — 切 Postgres 时取消注释,并把 .env DATABASE_URL 指向 db
  # db:
  #   image: postgres:17-alpine
  #   environment:
  #     POSTGRES_USER: autofree
  #     POSTGRES_PASSWORD: changeme
  #     POSTGRES_DB: autofree
  #   volumes:
  #     - ./data/pg:/var/lib/postgresql/data
  #   restart: unless-stopped
